<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>FAQ — CALee Research | Korean Acupuncture & Framework Questions</title>
<link rel="icon" type="image/png" href="/assets/images/favicon.png"/>
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png"/>

<meta name="description" content="Frequently asked questions about Korean acupuncture at CALee Acupuncture in Buena Park, CA — chronic pain, sciatica, neuropathy, first visits, insurance, and more."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/style.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
:root{--ink:#1A1208;--ink-mid:#4A3F30;--ink-soft:#8A7A68;--cream:#FAF7F2;--surface:#FFF;--rule:#E8E0D4;--jade:#2D5C46;--jade-light:#EBF2EE;--jade-mid:#4A8C6A;--radius:10px;--serif:'Cormorant Garamond',Georgia,serif;--sans:'IBM Plex Sans',system-ui,sans-serif;--mono:'IBM Plex Mono',monospace;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;scroll-behavior:smooth;}
body{background:var(--cream);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;}
.wrap{max-width:880px;margin:0 auto;padding:0 22px;}
a{color:var(--jade);}
a:hover{text-decoration:underline;}
.page-header{padding:40px 0 26px;border-bottom:2px solid var(--ink);}
.eyebrow{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--jade);margin-bottom:10px;}
.page-header h1{font-family:var(--serif);font-size:clamp(2rem,4vw,2.8rem);font-weight:700;margin-bottom:6px;}
.page-header p{font-size:.94rem;color:var(--ink-mid);max-width:540px;line-height:1.65;margin-bottom:16px;}
.search-wrap{position:relative;max-width:440px;}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink-soft);pointer-events:none;}
#faqSearch{width:100%;font-family:var(--sans);font-size:.93rem;padding:10px 14px 10px 38px;border:2px solid var(--ink);border-radius:8px;background:var(--surface);color:var(--ink);}
#faqSearch:focus{outline:none;border-color:var(--jade);}
#searchCount{font-family:var(--mono);font-size:.7rem;color:var(--ink-soft);margin-top:4px;min-height:16px;}
.layout{display:flex;gap:0;align-items:flex-start;}
.sidebar{flex:0 0 196px;padding:22px 14px 40px 0;position:sticky;top:0;max-height:100vh;overflow-y:auto;}
.sidebar-title{font-family:var(--mono);font-size:.64rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-soft);margin-bottom:10px;}
.sidebar-nav{display:flex;flex-direction:column;gap:1px;}
.sidebar-nav a{font-size:.83rem;color:var(--ink-mid);padding:7px 10px;border-radius:6px;display:block;border-left:3px solid transparent;transition:background .1s,color .1s,border-color .1s;text-decoration:none;}
.sidebar-nav a:hover,.sidebar-nav a.active{background:var(--jade-light);color:var(--jade);border-left-color:var(--jade);font-weight:600;}
.main{flex:1;padding:22px 0 60px 26px;min-width:0;border-left:1px solid var(--rule);}
.state-msg{margin:24px 0;padding:16px 20px;border:1.5px dashed var(--rule);border-radius:var(--radius);font-family:var(--mono);font-size:.84rem;color:var(--ink-soft);}
.state-msg--error{border-color:rgba(148,64,48,.4);color:rgb(148,64,48);background:rgba(148,64,48,.04);}
.hidden{display:none!important;}
.cat-block{margin-bottom:42px;}
.cat-header{margin-bottom:14px;padding-bottom:8px;border-bottom:2px solid var(--ink);display:flex;align-items:baseline;gap:10px;}
.cat-header h2{font-family:var(--serif);font-size:1.48rem;font-weight:700;}
.cat-count{font-family:var(--mono);font-size:.7rem;color:var(--ink-soft);}
.faq-item{border:1.5px solid var(--rule);border-radius:var(--radius);margin-bottom:6px;background:var(--surface);transition:border-color .15s;}
.faq-item:hover{border-color:rgba(45,92,70,.3);}
.faq-item.hidden{display:none;}
.faq-q{width:100%;text-align:left;background:none;border:none;cursor:pointer;padding:12px 15px;display:flex;justify-content:space-between;align-items:flex-start;font-family:var(--sans);font-size:.93rem;font-weight:600;color:var(--ink);gap:10px;line-height:1.45;}
.faq-q:hover,.faq-q[aria-expanded="true"]{color:var(--jade);}
.faq-icon{flex-shrink:0;font-size:.9rem;color:var(--jade);transition:transform .18s;margin-top:2px;}
.faq-q[aria-expanded="true"] .faq-icon{transform:rotate(45deg);}
.faq-a{max-height:0;overflow:hidden;transition:max-height .25s ease;}
.faq-a.open{max-height:1000px;}
.faq-a-inner{padding:0 15px 14px;font-size:.9rem;color:var(--ink-mid);line-height:1.75;}
@media(max-width:660px){.layout{flex-direction:column;}.sidebar{position:static;flex:none;width:100%;max-height:none;padding:14px 0;overflow-x:auto;border-bottom:1px solid var(--rule);}.sidebar-nav{flex-direction:row;flex-wrap:wrap;gap:5px;}.sidebar-nav a{padding:5px 10px;border-left:none;border-bottom:2px solid transparent;border-radius:4px;font-size:.8rem;}.main{padding:18px 0 40px;border-left:none;}}
@media(prefers-reduced-motion:reduce){*{transition:none!important;}}
</style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-40LK5S10Z3"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-40LK5S10Z3');
</script>
<!-- BUILD:FAQ-SCHEMA:START --><!-- BUILD:FAQ-SCHEMA:END -->
</head>
<body>
<div class="wrap">
<div class="page-header">
  <p class="eyebrow">CALee Acupuncture · Buena Park, CA</p>
  <h1>Frequently Asked Questions</h1>
  <p>Real questions from patients — including what to do when other treatments haven't worked.</p>
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="search" id="faqSearch" placeholder="Search questions…" aria-label="Search FAQ"/>
    <div id="searchCount"></div>
  </div>
</div>
</div>

<div class="layout wrap">
  <nav class="sidebar">
    <div class="sidebar-title">Categories</div>
    <div class="sidebar-nav" id="sidebarNav"><!-- BUILD:FAQ-NAV:START --><!-- BUILD:FAQ-NAV:END --></div>
  </nav>
  <main class="main">
    <p class="state-msg" id="loadingMsg">Loading questions…</p>
    <p class="state-msg state-msg--error hidden" id="errorMsg"></p>
    <div id="faqMain"><!-- BUILD:FAQ-ITEMS:START --><!-- BUILD:FAQ-ITEMS:END --></div>
  </main>
</div>

<script>
// ── Config ─────────────────────────────────────────────────────
var SHEET_ID = "1e7pPwW9FC3aTICG1GYJagYQfTALOtIzhAa0SWIga7kA";
var FAQ_SHEET = "FAQ";

// ── Utilities ──────────────────────────────────────────────────
function csvUrl(){
  return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+"/gviz/tq?tqx=out:csv&sheet="+encodeURIComponent(FAQ_SHEET);
}

function pick(row, keys){
  var rk = Object.keys(row);
  for(var i=0;i<keys.length;i++){
    var k=keys[i].toLowerCase();
    var f=rk.find(function(x){return x&&x.trim().toLowerCase()===k;});
    if(f!==undefined){var v=row[f];return v!=null?String(v).trim():"";}
  }
  return "";
}

function esc(s){
  return String(s||"").replace(/[&<>"']/g,function(c){
    return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

// ── Schema ─────────────────────────────────────────────────────
function buildSchema(items){
  var entities = items.map(function(item){
    return {"@type":"Question","name":item.q,"acceptedAnswer":{"@type":"Answer","text":item.a}};
  });
  var s=document.createElement("script");
  s.type="application/ld+json";
  s.textContent=JSON.stringify({"@context":"https://schema.org","@type":"FAQPage","mainEntity":entities});
  document.head.appendChild(s);
}

// ── Render ─────────────────────────────────────────────────────
function makeItem(item){
  var d=document.createElement("div");
  d.className="faq-item";
  d.dataset.q=(item.q+" "+item.a).toLowerCase();
  d.innerHTML='<button class="faq-q" aria-expanded="false"><span>'+esc(item.q)+'</span><span class="faq-icon">+</span></button>'
    +'<div class="faq-a"><div class="faq-a-inner">'+esc(item.a)+'</div></div>';
  return d;
}

function render(data){
  // Group by category (preserve order of first appearance)
  var catOrder=[], catMap={}, catLabels={};
  data.forEach(function(row){
    var id=pick(row,["CategoryID","Category ID","categoryid"]);
    var label=pick(row,["Category","category"]);
    var q=pick(row,["Question","question"]);
    var a=pick(row,["Answer","answer"]);
    if(!id||!q||!a) return;
    if(!catMap[id]){catMap[id]=[];catOrder.push(id);catLabels[id]=label||id;}
    catMap[id].push({q:q,a:a});
  });

  buildSchema(data.map(function(row){
    return{q:pick(row,["Question","question"]),a:pick(row,["Answer","answer"])};
  }).filter(function(i){return i.q&&i.a;}));

  // Sidebar
  var nav=document.getElementById("sidebarNav");
  catOrder.forEach(function(id){
    var a=document.createElement("a");
    a.href="#cat-"+id; a.textContent=catLabels[id]; a.dataset.cat=id;
    nav.appendChild(a);
  });

  // Cards
  var main=document.getElementById("faqMain");
  catOrder.forEach(function(id){
    var items=catMap[id];
    var block=document.createElement("div");
    block.className="cat-block"; block.id="cat-"+id;
    block.innerHTML='<div class="cat-header"><h2>'+esc(catLabels[id])+'</h2>'
      +'<span class="cat-count">'+items.length+' questions</span></div>';
    items.forEach(function(item){block.appendChild(makeItem(item));});
    main.appendChild(block);
  });

  initObserver(); initSearch();
}

// ── Shared enhancers (정적/동적 공용) ──────────────────────────
function bindAccordion(){
  document.getElementById("faqMain").addEventListener("click",function(e){
    var btn=e.target.closest(".faq-q"); if(!btn) return;
    var item=btn.closest(".faq-item");
    var open=btn.getAttribute("aria-expanded")==="true";
    btn.setAttribute("aria-expanded",open?"false":"true");
    item.querySelector(".faq-a").classList.toggle("open",!open);
  });
}
function initObserver(){
  var obs=new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){
        var id=e.target.id.replace("cat-","");
        document.querySelectorAll(".sidebar-nav a").forEach(function(a){
          a.classList.toggle("active",a.dataset.cat===id);
        });
      }
    });
  },{rootMargin:"-40% 0px -40% 0px"});
  document.querySelectorAll(".cat-block").forEach(function(b){obs.observe(b);});
}
function initSearch(){
  var inp=document.getElementById("faqSearch"),countEl=document.getElementById("searchCount"),t;
  inp.addEventListener("input",function(){
    clearTimeout(t); var v=inp.value.trim();
    t=setTimeout(function(){
      var q=v.toLowerCase(),visible=0;
      document.querySelectorAll(".faq-item").forEach(function(el){
        var show=!q||el.dataset.q.indexOf(q)!==-1;
        el.classList.toggle("hidden",!show); if(show)visible++;
      });
      document.querySelectorAll(".cat-block").forEach(function(b){
        b.style.display=b.querySelectorAll(".faq-item:not(.hidden)").length?"":"none";
      });
      countEl.textContent=q?visible+" result"+(visible===1?"":"s"):"";
    },150);
  });
}

// ── Init ───────────────────────────────────────────────────────
bindAccordion();
if(document.querySelector("#faqMain .faq-item")){
  // 빌드된 정적 콘텐츠 존재 → 시트 fetch 생략 (스키마도 정적으로 이미 삽입됨)
  document.getElementById("loadingMsg").classList.add("hidden");
  initObserver(); initSearch();
} else Papa.parse(csvUrl(),{
  download:true, header:true, skipEmptyLines:true,
  complete:function(results){
    document.getElementById("loadingMsg").classList.add("hidden");
    if(!results.data||!results.data.length){
      var err=document.getElementById("errorMsg");
      err.classList.remove("hidden");
      err.textContent="No data found. Make sure the FAQ tab exists in the Google Sheet and is shared as 'Anyone with the link — Viewer'.";
      return;
    }
    render(results.data);
  },
  error:function(){
    document.getElementById("loadingMsg").classList.add("hidden");
    var err=document.getElementById("errorMsg");
    err.classList.remove("hidden");
    err.innerHTML='Could not load FAQ data. Ensure the Google Sheet is shared as <b>Anyone with the link — Viewer</b>.';
  }
});
</script>
<script src="/assets/site.js"></script>
</body>
</html>
